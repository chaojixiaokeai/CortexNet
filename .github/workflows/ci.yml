name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Static checks
        run: |
          python -m compileall -q cortexnet scripts tests examples
          python -m pyflakes cortexnet tests scripts examples
          python -m ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run test suite
        run: |
          python -m pytest -q
          python scripts/dev/run_tests.py
          python examples/minimal_infer.py
          python examples/train_tiny.py --steps 2 --batch-size 1 --seq-len 16 --device cpu

      - name: Verify package build
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
